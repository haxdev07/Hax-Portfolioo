<body>

  <div class="nav-inner">

      <h1>Harshil</h1><span>HAX</span>

<main class="container">
  <h2 class="section-title">Contact Me</h2>
  <p class="section-desc">Let's build something together.</p>

  <div id="form-message" style="
    display:none;
    max-width:700px;
    margin:0 auto 20px;
    padding:14px 20px;
    border-radius:12px;
    font-weight:600;
    text-align:center;
  "></div>

  <form id="contact-form">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Your Message" required></textarea>
    <button class="btn primary" type="submit">Send Message</button>
  </form>
</main>

<footer class="site-footer">
  <div class="footer-content">
    <small>© 2025 Harshil HAX</small>
    <div class="footer-links">
      <a href="https://www.instagram.com/hax.dev07?igsh=OXBxM2JubGMyOWht" target="_blank">Instagram</a>
      <a href="https://whatsapp.com/channel/0029Vb6aNp13bbV2AABXIw25" target="_blank">WhatsApp</a>
      <a href="https://github.com/haxdev07" target="_blank">GitHub</a>
    </div>
  </div>
</footer>

<script src="js/script.js"></script>

<script>
document.getElementById('contact-form').addEventListener('submit', async function(e) {
  e.preventDefault();

  const formData = {
    name: this.name.value,
    email: this.email.value,
    message: this.message.value
  };

  const msgBox = document.getElementById('form-message');
  const btn = this.querySelector('button');
  btn.textContent = 'Sending...';
  btn.disabled = true;

  try {
    const res = await fetch('https://hax-portfolioo.onrender.com/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData)
    });

    const data = await res.json();

    if (data.success) {
      msgBox.style.display = 'block';
      msgBox.style.background = 'rgba(25,255,210,0.12)';
      msgBox.style.color = '#19ffd2';
      msgBox.style.border = '1px solid rgba(25,255,210,0.3)';
      msgBox.textContent = 'Message sent! I will get back to you soon.';
      this.reset();
    }
  } catch (err) {
    msgBox.style.display = 'block';
    msgBox.style.background = 'rgba(255,80,80,0.12)';
    msgBox.style.color = '#ff6b6b';
    msgBox.style.border = '1px solid rgba(255,80,80,0.3)';
    msgBox.textContent = 'Oops! Something went wrong. Please try again later or contact me on WhatsApp. +91 87991 26286';
  }

  btn.textContent = 'Send Message';
  btn.disabled = false;
});
</script>

</body>
</html>
